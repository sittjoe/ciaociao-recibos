<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Simple PDF - ciaociao.mx</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #testContent {
            width: 794px;
            padding: 40px;
            border: 1px solid #ccc;
            background: white;
        }
        button {
            margin: 20px 0;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Test Simple de Generación de PDF</h1>
    
    <div id="testContent">
        <h2>Recibo de Prueba - ciaociao.mx</h2>
        <p><strong>Fecha:</strong> 25 de Agosto 2025</p>
        <p><strong>Cliente:</strong> Cliente de Prueba</p>
        <p><strong>Producto:</strong> Anillo de Oro 14k</p>
        <p><strong>Peso:</strong> 5 gramos</p>
        <p><strong>Precio:</strong> $10,000 MXN</p>
        <hr>
        <p>Este es un recibo de prueba para verificar la generación de PDF.</p>
    </div>
    
    <button onclick="generatePDF()">Generar PDF de Prueba</button>
    <div id="status"></div>
    
    <script>
        async function generatePDF() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Generando PDF...';
            statusDiv.className = 'status';
            
            try {
                const element = document.getElementById('testContent');
                
                // Capturar el contenido con html2canvas
                const canvas = await html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    logging: true,
                    backgroundColor: '#ffffff'
                });
                
                // Crear PDF con jsPDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });
                
                // Agregar imagen al PDF
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210; // A4 width in mm
                const pageHeight = 297; // A4 height in mm
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                
                // Descargar PDF
                pdf.save('recibo-prueba.pdf');
                
                statusDiv.innerHTML = 'PDF generado exitosamente!';
                statusDiv.className = 'status success';
                
            } catch (error) {
                console.error('Error generando PDF:', error);
                statusDiv.innerHTML = `Error: ${error.message}`;
                statusDiv.className = 'status error';
            }
        }
    </script>
</body>
</html>
